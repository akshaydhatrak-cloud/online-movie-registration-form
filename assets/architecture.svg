<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Binge Watch Online global AWS deployment</title>
  <desc id="desc">Static content is hosted in S3, distributed through CloudFront, routed by Route 53, and backed by EC2 services behind a load balancer across dev, test, and production environments.</desc>
  <rect width="1120" height="620" fill="#f7f8fa"/>
  <text x="56" y="64" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">Binge Watch Online Global Deployment</text>
  <text x="56" y="98" fill="#536173" font-family="Segoe UI, Arial, sans-serif" font-size="18">S3 static hosting, CloudFront edge caching, Route 53 DNS, and EC2 backend services</text>

  <rect x="70" y="176" width="210" height="126" rx="8" fill="#ffffff" stroke="#c4ccd8" stroke-width="2"/>
  <text x="106" y="224" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">Route 53</text>
  <text x="106" y="254" fill="#536173" font-family="Segoe UI, Arial, sans-serif" font-size="15">DNS routing</text>

  <rect x="356" y="156" width="250" height="166" rx="8" fill="#ffffff" stroke="#c4ccd8" stroke-width="2"/>
  <text x="400" y="214" fill="#ff9900" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">CloudFront</text>
  <text x="400" y="246" fill="#536173" font-family="Segoe UI, Arial, sans-serif" font-size="15">Global CDN and edge cache</text>
  <text x="400" y="274" fill="#536173" font-family="Segoe UI, Arial, sans-serif" font-size="15">Static content cache</text>

  <rect x="710" y="126" width="300" height="118" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="752" y="170" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">S3 Static Content</text>
  <text x="752" y="200" fill="#536173" font-family="Segoe UI, Arial, sans-serif" font-size="15">HTML, CSS, and JavaScript assets</text>

  <rect x="710" y="300" width="300" height="126" rx="8" fill="#eef6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="752" y="346" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">EC2 Backend</text>
  <text x="752" y="376" fill="#536173" font-family="Segoe UI, Arial, sans-serif" font-size="15">Auto Scaling group behind ALB</text>
  <text x="752" y="402" fill="#536173" font-family="Segoe UI, Arial, sans-serif" font-size="15">Served through /api/* origin path</text>

  <path d="M280 239 H356" stroke="#536173" stroke-width="3"/>
  <path d="M606 210 H710" stroke="#536173" stroke-width="3"/>
  <path d="M606 260 C660 260 660 363 710 363" fill="none" stroke="#536173" stroke-width="3"/>
  <path d="M342 230 L356 239 L342 248" fill="none" stroke="#536173" stroke-width="3"/>
  <path d="M696 201 L710 210 L696 219" fill="none" stroke="#536173" stroke-width="3"/>
  <path d="M696 354 L710 363 L696 372" fill="none" stroke="#536173" stroke-width="3"/>

  <rect x="122" y="470" width="876" height="76" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="162" y="506" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Environment strategy</text>
  <text x="162" y="532" fill="#536173" font-family="Segoe UI, Arial, sans-serif" font-size="15">The same CloudFormation template deploys isolated dev, test, and prod stacks through the EnvironmentName parameter.</text>
</svg>
