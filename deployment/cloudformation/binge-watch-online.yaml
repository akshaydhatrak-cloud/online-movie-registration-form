AWSTemplateFormatVersion: "2010-09-09"
Description: Binge Watch Online static website on S3, CloudFront, Route 53, and EC2.

Parameters:
  ProjectName:
    Type: String
    Default: binge-watch-online

  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

  WebsiteBucketName:
    Type: String
    Description: Globally unique bucket name for the static website files.

  TeamShareBucketName:
    Type: String
    Description: Globally unique bucket name for shared team files.

  HostedZoneId:
    Type: String
    Default: ""
    Description: Optional Route 53 hosted zone id. Leave empty if no domain is ready.

  DomainName:
    Type: String
    Default: ""
    Description: Optional domain name, for example www.example.com.

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: Optional ACM certificate ARN from us-east-1 for the domain name.

  CreateEc2:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  VpcId:
    Type: String
    Default: ""
    Description: Required only when CreateEc2 is true.

  SubnetId:
    Type: String
    Default: ""
    Description: Required only when CreateEc2 is true.

  KeyName:
    Type: String
    Default: ""
    Description: Optional EC2 key pair name.

  AdminCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed for SSH. For real use, set this to your IP /32.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Conditions:
  HasCustomDomain: !And
    - !Not [!Equals [!Ref HostedZoneId, ""]]
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref AcmCertificateArn, ""]]
  ShouldCreateEc2: !Equals [!Ref CreateEc2, "true"]
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebsiteBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Purpose
          Value: WebsiteHosting

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebsiteDistribution}"

  TeamShareBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref TeamShareBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Purpose
          Value: TeamShare

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-${EnvironmentName}-s3-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName} ${EnvironmentName} website CDN"
        DefaultRootObject: index.html
        Aliases: !If
          - HasCustomDomain
          - - !Ref DomainName
          - !Ref AWS::NoValue
        Origins:
          - Id: s3-website-origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: s3-website-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          CloudFrontDefaultCertificate: !If [HasCustomDomain, !Ref AWS::NoValue, true]
          AcmCertificateArn: !If [HasCustomDomain, !Ref AcmCertificateArn, !Ref AWS::NoValue]
          SslSupportMethod: !If [HasCustomDomain, sni-only, !Ref AWS::NoValue]
          MinimumProtocolVersion: !If [HasCustomDomain, TLSv1.2_2021, !Ref AWS::NoValue]

  WebsiteDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt WebsiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  Ec2S3Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BingeWatchS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !GetAtt WebsiteBucket.Arn
                  - !GetAtt TeamShareBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "${WebsiteBucket.Arn}/*"
                  - !Sub "${TeamShareBucket.Arn}/*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2S3Role

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: ShouldCreateEc2
    Properties:
      GroupDescription: SSH access for Binge Watch admin VM
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminCidr
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  AdminInstance:
    Type: AWS::EC2::Instance
    Condition: ShouldCreateEc2
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t3.micro
      IamInstanceProfile: !Ref Ec2InstanceProfile
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-admin-vm"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  WebsiteBucket:
    Value: !Ref WebsiteBucket

  TeamShareBucket:
    Value: !Ref TeamShareBucket

  CloudFrontDomainName:
    Value: !GetAtt WebsiteDistribution.DomainName

  CloudFrontDistributionId:
    Value: !Ref WebsiteDistribution

  Route53Record:
    Condition: HasCustomDomain
    Value: !Ref WebsiteDnsRecord

  Ec2RoleName:
    Value: !Ref Ec2S3Role
