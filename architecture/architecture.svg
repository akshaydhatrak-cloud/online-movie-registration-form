  <rect x="230" y="70" width="130" height="64" class="box aws"/>
  <text x="295" y="99" text-anchor="middle" class="text">Route 53</text>
  <text x="295" y="120" text-anchor="middle" class="small">DNS routing</text>
  <rect x="420" y="70" width="150" height="64" class="box aws"/>
  <text x="495" y="99" text-anchor="middle" class="text">CloudFront</text>
  <text x="495" y="120" text-anchor="middle" class="small">CDN cache</text>
  <rect x="650" y="70" width="170" height="64" class="box store"/>
  <text x="735" y="99" text-anchor="middle" class="text">S3 website bucket</text>
  <text x="735" y="120" text-anchor="middle" class="small">HTML files</text>
  <line x1="170" y1="102" x2="230" y2="102" class="line"/>
  <line x1="360" y1="102" x2="420" y2="102" class="line"/>
  <line x1="570" y1="102" x2="650" y2="102" class="line"/>
  <rect x="250" y="250" width="160" height="64" class="box aws"/>
  <text x="330" y="279" text-anchor="middle" class="text">EC2 support VM</text>
  <text x="330" y="300" text-anchor="middle" class="small">AWS CLI checks</text>
  <rect x="650" y="250" width="170" height="64" class="box store"/>
  <text x="735" y="279" text-anchor="middle" class="text">S3 team bucket</text>
  <text x="735" y="300" text-anchor="middle" class="small">shared files</text>
  <rect x="450" y="330" width="170" height="54" class="box aws"/>
  <text x="535" y="362" text-anchor="middle" class="text">IAM scoped access</text>
  <line x1="410" y1="282" x2="650" y2="282" class="line dash"/>
  <line x1="410" y1="260" x2="665" y2="134" class="line dash"/>
