<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}
      .aws{fill:#fff7ed;stroke:#c2410c}
      .store{fill:#ecfdf5;stroke:#047857}
      .text{font-family:Arial, sans-serif;font-size:16px;fill:#111827}
      .small{font-size:13px;fill:#4b5563}
      .line{stroke:#374151;stroke-width:2;marker-end:url(#arrow)}
      .dash{stroke-dasharray:6 6}
    </style>
  </defs>
  <rect x="40" y="70" width="130" height="64" class="box"/>
  <text x="105" y="99" text-anchor="middle" class="text">Global users</text>
